<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Scouse Arab Bantz — Watch</title>
<meta property="og:title" content="Scouse Arab Bantz">
<meta property="og:description" content="The Podcast — Watch the trailer and full episode">
<meta property="og:image" content="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/assets/artwork.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Helvetica Neue',sans-serif;min-height:100vh;-webkit-text-size-adjust:100%}
.header{text-align:center;padding:30px 20px 15px}
.header img{width:80px;height:80px;border-radius:50%;border:2px solid #d4af37;object-fit:cover}
.header h1{font-size:1.6em;color:#d4af37;margin:10px 0 2px;letter-spacing:1px}
.header p{color:#666;font-size:0.9em}
.tabs{display:flex;justify-content:center;gap:0;margin:20px auto;max-width:600px;padding:0 15px}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:#111;color:#888;border:1px solid #222;font-size:0.95em;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.tab:first-child{border-radius:8px 0 0 8px}
.tab:last-child{border-radius:0 8px 8px 0}
.tab:nth-child(2){border-radius:0}
.tab.active{background:#1a1a1a;color:#d4af37;border-color:#d4af37}
.player{max-width:800px;margin:0 auto;padding:0 15px}
.player video{width:100%;border-radius:8px;background:#000;margin-top:15px;max-height:70vh}
.info{text-align:center;padding:10px;color:#555;font-size:0.8em;margin-top:8px}
.hidden{display:none}
footer{text-align:center;padding:30px;color:#333;font-size:0.75em}
footer a{color:#d4af37;text-decoration:none}
@media(max-width:600px){
  .header h1{font-size:1.3em}
  .header img{width:60px;height:60px}
  .player video{border-radius:4px;margin-top:10px}
}
</style>
</head>
<body>
<div class="header">
<img src="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/assets/artwork.png" alt="Scouse Arab Bantz">
<h1>SCOUSE ARAB BANTZ</h1>
<p>The Podcast</p>
</div>
<div class="tabs">
<div class="tab active" onclick="show('trailer',this)">Trailer</div>
<div class="tab" onclick="show('episode',this)">Full Episode</div>
<div class="tab" onclick="show('showreel',this)">Behind the Scenes</div>
</div>
<div class="player">
<div id="trailer">
<video id="vid-trailer" controls playsinline webkit-playsinline preload="metadata"
  poster="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/assets/artwork.png">
<source src="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/trailer/trailer.mp4?v=5" type="video/mp4">
</video>
<div class="info">Trailer — 1:48</div>
</div>
<div id="episode" class="hidden">
<video id="vid-episode" controls playsinline webkit-playsinline preload="metadata"
  poster="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/assets/artwork.png">
<source src="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/ep1/full_episode.mp4?v=5" type="video/mp4">
</video>
<div class="info">Full Episode — 11:37</div>
</div>
<div id="showreel" class="hidden">
<video id="vid-showreel" controls playsinline webkit-playsinline preload="metadata"
  poster="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/assets/artwork.png">
<source src="https://tvecnfdqakrevzaeifpk.supabase.co/storage/v1/object/public/v3-scouse-arab-bants/ep1/showreel.mp4?v=1" type="video/mp4">
</video>
<div class="info">Behind the Scenes — 6:22 — The making of Episode 1</div>
</div>
</div>
<footer><a href="https://justicemindsdev.github.io/scouse-arab-bantz/">justicemindsdev.github.io/scouse-arab-bantz</a></footer>
<script>
function show(id, tab) {
  // Pause all videos first
  document.querySelectorAll('video').forEach(function(v) { v.pause(); });
  // Toggle visibility
  document.querySelectorAll('.player > div').forEach(function(d) { d.classList.add('hidden'); });
  document.getElementById(id).classList.remove('hidden');
  // Toggle tab styling
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  if (tab) tab.classList.add('active');
}
// When trailer ends, auto-switch to episode
document.getElementById('vid-trailer').addEventListener('ended', function() {
  show('episode', document.querySelectorAll('.tab')[1]);
});
</script>
</body>
</html>
